services:
  gamewatch:
    build: .
    container_name: gamewatch
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GAMEWATCH_ADMIN_TOKEN=${GAMEWATCH_ADMIN_TOKEN:-}
    volumes:
      - ./gamewatch.yaml:/app/gamewatch.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
