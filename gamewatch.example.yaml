# Gamewatch — Configuration
# Copy this file to gamewatch.yaml and edit to match your setup.
# All values can be overridden via environment variables:
#   GAMEWATCH_SITE_NAME, GAMEWATCH_SERVERS_0_API_URL, etc.

site:
  name: "My Game Servers"
  locale: "en"              # "en" | "ja"
  refreshInterval: 30       # Auto-refresh interval in seconds
  footer:
    text: "Powered by"
    link:
      label: "Gamewatch"
      url: "https://github.com/toshi-developer/gamewatch"

# Optional: InfluxDB integration for history charts
# Connect to game-monitor-agent's InfluxDB for player count / system metrics history
# influxdb:
#   url: "http://localhost:8086"
#   token: "my-super-secret-auth-token"
#   org: "toshi-dev"
#   bucket: "game_metrics"

servers:
  # 7 Days to Die (Allocs Web API)
  - id: "sdtd-main"
    game: "sdtd"
    label: "7 Days to Die Server"
    apiUrl: "http://localhost:8081"
    monitorName: "7DTD-Main"  # Optional: matches server_name tag in InfluxDB
    auth:
      tokenName: ""          # Optional: Allocs API token name
      tokenSecret: ""        # Optional: Allocs API token secret
    mods:                    # Optional: static mod list
      - name: "The Anomaly Project"
        version: "3.5.5"
        category: "overhaul"

  # FiveM
  - id: "fivem-rp"
    game: "fivem"
    label: "FiveM RP Server"
    apiUrl: "http://localhost:30120"
    resourceName: "gamewatch_api"  # FiveM resource name (default: gamewatch_api)

